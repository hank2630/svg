<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TEST-1 (YouTube only)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@100..900&family=Zen+Antique+Soft&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: "Zen Antique Soft", serif;
  font-weight: 300;
  font-style: normal;
        background-color:#343434;
      }
    .container {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 100vw;
      padding: 20px;
      box-sizing: border-box;
      flex-wrap: wrap;
    }

    .info-box {
      width: 30vw;
      font-size: 0.95rem;
      line-height: 1.5;
      padding-right: 20px;
      word-wrap: break-word;
      box-sizing: border-box;
      color: #fff;
    }

    .video-container {
      width: 65vw;
      aspect-ratio: 16 / 9;
      position: relative;
      margin-left: auto;
      background: #000;
    }

    #player {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      background: #000;
    }

    /* 縮圖覆蓋（若需要顯示縮圖） */
    #yt-thumb {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      display: none;
      cursor: pointer;
    }

    .section-label {
      font-weight: 500;
      color: white;
      margin-top: 1.1em;
      display: none;
    }

    #video-title,
    #video-subtitle,
    #video-description,
    #video-link-icon {
      display: none;
      color: white;
      position: static;
    }

    #loading-indicator {
      font-style: italic;
      color: #666;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* 手機版排版 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .info-box, .video-container {
        width: 100%;
        max-width: 95vw;
        padding: 10px 0;
        text-align: center;
      }

      .info-box {
        font-size: 1rem;
      }
    }
    .collapsible {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s ease-out;
}

.collapsible.open {
  max-height: 500px; /* 足夠顯示所有文字，可根據需求調整 */
}

.toggle-button {
  cursor: pointer;
  color: #95c7fc;
  text-decoration: underline;
  display: none;
  margin-top: 5px;
}
#countdown-bar {
  overflow: hidden;
  white-space: nowrap;
  color: white;
  font-size: 0.9rem;
  padding: 10px;
  box-sizing: border-box;
  text-align: center;  /* 讓文字置中 */
}

@keyframes scroll-text {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-100%);
  }
}
.current-time-line {
  font-family: "DotGothic16", sans-serif;
  font-weight: 500;
  font-style: normal;
  font-size: 1.1rem;
  color: hsl(129, 100%, 50%);
}
.share-button {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      background-color: #000;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      font-weight: bold;
      font-size: 12px;
    }

.share-button2 {
      color: white;
    }

.share-button2 img {
      width: 20px;
      height: 20px;
    }

    .share-button img {
      width: 15px;
      height: 15px;
      margin-right: 8px;
    }

    .share-button:hover {
      opacity: 0.85;
     }

    .search-container {
      margin-top: 20px;
      padding: 15px;
      background-color: #555;
      border-radius: 5px;
    }

    .search-container input {
      padding: 8px 12px;
      border: none;
      border-radius: 3px;
      width: 80%;
      max-width: 300px;
      font-size: 0.9rem;
    }

    .search-container button {
      padding: 8px 15px;
      margin-left: 10px;
      background-color: #95c7fc;
      color: #000;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .search-container button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="countdown-bar" style="text-align:center; padding:8px; color:#fff;">
    <div id="countdown-text"></div>
  </div>

  <div class="container">
    <div class="info-box">
      <div id="loading-indicator">隨機抽選影片中...</div>

      <a class="share-button2" id="video-link-icon" href="#" target="_blank" style="display:none">
        <img src="https://raw.githubusercontent.com/hank2630/svg/main/x-white.svg" alt="X Logo">
      </a>

      <div id="video-title" style="font-weight:700; margin-top:8px"></div>
      <div class="section-label">【專輯名稱】</div>
      <div id="video-subtitle" style="margin-bottom:6px"></div>

      <div id="video-description" class="collapsible" style="white-space:pre-wrap"></div>
      <div id="toggle-description" class="toggle-button">【Credits】</div>

      <div class="search-container">
        <input type="text" id="globalSearchInput" placeholder="搜尋整個資料庫..." />
        <button onclick="openSearchPage()">🔍搜尋</button>
      </div>
    </div>

    <div class="video-container">
      <img id="yt-thumb" alt="YouTube thumbnail (click to open)">
      <div id="player"></div>
    </div>
  </div>

  <script>
  // CONFIG
  const SHEET_JSON_URL = "https://raw.githubusercontent.com/hank2630/svg/main/db/m3-2026-spring.json";
  const WHOLE_DB_URL = "https://raw.githubusercontent.com/hank2630/svg/refs/heads/main/whole_db";

  // state
  let player = null;
  let playerReady = false;
  let pendingVideoId = null;
  let videoData = [];
  let currentVideoId = null;
  let isSelecting = false;

  // load YT API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  // helpers: extract youtube id (first 11-char match)
  function extractYoutubeIdFromString(s) {
    if (!s) return null;
    const m = String(s).match(/([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function getVideoIdFromUrl(raw) {
    if (!raw) return null;
    const s = String(raw).trim();
    try {
      const u = new URL(s);
      const host = u.hostname.replace(/^www\./,'').toLowerCase();
      if (host === 'youtu.be') return extractYoutubeIdFromString(u.pathname.slice(1));
      if (host.endsWith('youtube.com')) {
        if (u.searchParams.has('v')) {
          const v = extractYoutubeIdFromString(u.searchParams.get('v'));
          if (v) return v;
        }
        const emb = u.pathname.match(/\/embed\/([a-zA-Z0-9_-]{1,})/);
        if (emb && emb[1]) return extractYoutubeIdFromString(emb[1]);
      }
    } catch(e) {
      // not URL
    }
    return extractYoutubeIdFromString(s);
  }

  function isValidYoutubeId(id) {
    return typeof id === 'string' && /^[a-zA-Z0-9_-]{11}$/.test(id);
  }

  // check embeddable via noembed
  async function checkVideoEmbeddable(videoId) {
    try {
      const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
      if (!res.ok) {
        console.warn("noembed non-ok:", res.status);
        return true; // permissive on network issues
      }
      const j = await res.json();
      if (j.error) {
        console.warn("noembed error for id", videoId, j.error);
        return false;
      }
      return true;
    } catch (e) {
      console.warn("noembed fetch failed:", e);
      return true;
    }
  }

  // pick random YouTube item (only youtube). returns {item,videoId} or null
  function pickRandomYouTubeItem(maxTries = 30) {
    if (!Array.isArray(videoData) || videoData.length === 0) return null;
    for (let i=0;i<maxTries;i++){
      const idx = Math.floor(Math.random()*videoData.length);
      const candidate = videoData[idx];
      const possible = [
        candidate["XFD"],
        candidate.youtube_url,
        candidate.youtube_id,
        candidate.youtube,
        candidate.url,
        candidate["連結"],
        candidate["特設網站"],
        candidate["社群網站"]
      ].filter(Boolean);
      for (const raw of possible) {
        const id = getVideoIdFromUrl(raw);
        if (isValidYoutubeId(id)) {
          console.log("pickRandomYouTubeItem: chosen idx", idx, "id", id, "from", raw);
          return { item: candidate, videoId: id };
        } else if (id) {
          console.warn("pickRandomYouTubeItem: extracted non-11 id", id, "from", raw);
        }
      }
      // fallback: combined fields
      const combined = Object.values(candidate).join(' ');
      const id2 = extractYoutubeIdFromString(combined);
      if (isValidYoutubeId(id2)) {
        console.log("pickRandomYouTubeItem: fallback chosen idx", idx, "id", id2);
        return { item: candidate, videoId: id2 };
      }
    }
    return null;
  }

  // ensure YT player exists (creates if needed)
  function ensureYouTubePlayer() {
    if (player && typeof player.cueVideoById === 'function') return;
    const playerEl = document.getElementById('player');
    playerEl.innerHTML = '';
    try {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: '',
        playerVars: {
          autoplay: 0,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          origin: (window.location.origin && window.location.origin !== 'null') ? window.location.origin : location.protocol + '//' + location.host
        },
        events: {
          onReady: (e) => {
            playerReady = true;
            console.log("YT player ready");
            if (pendingVideoId) {
              try { player.cueVideoById(pendingVideoId); pendingVideoId = null; }
              catch(err){ console.error("cue pending error", err); }
            }
          },
          onError: onPlayerError,
          onStateChange: (e) => {
            const thumb = document.getElementById('yt-thumb');
            if (e.data === YT.PlayerState.PLAYING && thumb) thumb.style.display = 'none';
          }
        }
      });
    } catch(err){
      console.error("ensureYouTubePlayer error:", err);
    }
  }

  function clearPlayerArea() {
    try { if (player && typeof player.destroy === 'function') player.destroy(); } catch(e){/*ignore*/}
    player = null; playerReady = false; pendingVideoId = null;
    document.getElementById('player').innerHTML = '';
  }

  function setThumbnailForYoutube(id) {
    const thumb = document.getElementById('yt-thumb');
    if (!isValidYoutubeId(id)) { thumb.style.display = 'none'; return; }
    const hq = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
    const maxres = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
    thumb.src = hq; thumb.style.display = 'block';
    const img = new Image();
    img.onload = () => { if (img.width>120) thumb.src = maxres; };
    img.src = maxres;
  }

  // playRandomVideo: keep drawing until find embeddable YT or up to 20 attempts
  async function playRandomVideo() {
    if (isSelecting) { console.log("already selecting, skip"); return; }
    isSelecting = true;
    try {
      if (!Array.isArray(videoData) || videoData.length === 0) {
        document.getElementById('video-title').textContent = "沒有可用的影片資料";
        document.getElementById('loading-indicator').style.display = 'none';
        return;
      }

      const MAX_OVERALL = 20;
      let picked = null;
      for (let attempt = 0; attempt < MAX_OVERALL; attempt++) {
        const candidate = pickRandomYouTubeItem(30);
        if (!candidate) {
          console.log("playRandomVideo attempt", attempt+1, "no youtube candidate found, continuing");
          continue;
        }
        const vid = candidate.videoId;
        console.log("playRandomVideo attempt", attempt+1, "candidate id:", vid);
        // check embeddable
        const embeddable = await checkVideoEmbeddable(vid);
        if (embeddable) {
          picked = candidate;
          console.log("playRandomVideo: selected embeddable video", vid, "on attempt", attempt+1);
          break;
        } else {
          console.warn("playRandomVideo: candidate not embeddable, skipping", vid);
          // continue to next attempt
        }
      }

      if (!picked) {
        document.getElementById('video-title').textContent = "找不到可嵌入的 YouTube 影片（已嘗試 20 次）";
        document.getElementById('loading-indicator').style.display = 'none';
        console.warn("playRandomVideo: exhausted 20 attempts without finding embeddable YT");
        return;
      }

      await loadAndCueYouTube(picked.item, picked.videoId);
    } finally {
      setTimeout(()=>{ isSelecting = false; }, 200);
    }
  }

  // load UI and cue YT (helper)
  async function loadAndCueYouTube(item, videoId) {
    currentVideoId = videoId;
    const title = item["歌手/社團名稱"] || "無標題";
    const subtitle = item["專輯名稱"] || "";
    const description = item["Credits"] || "";
    const link = item["社群網站"] || "";

    document.getElementById('video-title').textContent = title;
    document.getElementById('video-subtitle').textContent = subtitle;
    document.getElementById('video-description').textContent = description || "—";

    const descEl = document.getElementById('video-description');
    descEl.style.display = 'block';
    descEl.classList.remove('open');
    const toggleBtn = document.getElementById('toggle-description');
    toggleBtn.style.display = 'inline-block';
    toggleBtn.textContent = "▼Credits";
    toggleBtn.onclick = () => {
      const isOpen = descEl.classList.toggle('open');
      toggleBtn.textContent = isOpen ? "▲Credits" : "▼Credits";
    };

    document.getElementById('video-title').style.display = 'block';
    document.getElementById('video-subtitle').style.display = 'block';
    document.getElementById('video-description').style.display = 'block';
    document.querySelectorAll('.section-label').forEach(el=>el.style.display='block');
    document.getElementById('loading-indicator').style.display = 'none';

    const linkEl = document.getElementById('video-link-icon');
    if (link && /^https?:\/\//.test(link)) { linkEl.href = link; linkEl.style.display = 'inline-block'; }
    else { linkEl.href='#'; linkEl.style.display='none'; }

    clearPlayerArea();
    ensureYouTubePlayer();

    setThumbnailForYoutube(videoId);

    if (playerReady && player && typeof player.cueVideoById === 'function') {
      try { player.cueVideoById(videoId); console.log("cued", videoId); }
      catch(e){ console.error("cue error", e); }
    } else {
      pendingVideoId = videoId;
      console.log("player not ready, pending", pendingVideoId);
    }
  }

  function onPlayerError(event) {
    const code = event && event.data;
    console.error('YouTube Player error code:', code, 'currentVideoId:', currentVideoId);
    const titleEl = document.getElementById('video-title');
    switch (code) {
      case 2: titleEl.textContent = "影片參數錯誤（錯誤代碼 2）"; break;
      case 5: titleEl.textContent = "無法播放此類型的影片（錯誤代碼 5）"; break;
      case 100: titleEl.textContent = "影片找不到或已被移除（錯誤代碼 100）"; break;
      case 101:
      case 150: titleEl.textContent = "此影片不允許嵌入（嵌入已被停用）"; break;
      default: titleEl.textContent = "影片播放錯誤，請稍後再試";
    }
    document.getElementById('loading-indicator').style.display = 'none';
    if (currentVideoId) {
      setThumbnailForYoutube(currentVideoId);
      const thumb = document.getElementById('yt-thumb');
      thumb.onclick = (ev)=>{ ev.stopPropagation(); window.open(`https://youtu.be/${currentVideoId}`, '_blank'); };
      if (thumb) thumb.style.display = 'block';
    }
  }

  // thumbnail click: try to play or open youtube
  document.getElementById('yt-thumb').addEventListener('click', (ev)=>{
    ev.stopPropagation();
    if (!currentVideoId) return;
    if (player && typeof player.playVideo === 'function') {
      try { player.playVideo(); } catch(e){ window.open(`https://youtu.be/${currentVideoId}`,'_blank'); }
    } else {
      window.open(`https://youtu.be/${currentVideoId}`,'_blank');
    }
  });

  // video container click: play only
  document.querySelector('.video-container').addEventListener('click', (ev)=>{
    ev.stopPropagation();
    if (isSelecting) { console.log("ignored click while selecting"); return; }
    if (player && typeof player.playVideo === 'function') player.playVideo();
  });

  // open search page in new tab
  function openSearchPage() {
    const searchTerm = document.getElementById('globalSearchInput').value;
    const searchUrl = `search.html?q=${encodeURIComponent(searchTerm)}`;
    window.open(searchUrl, '_blank');
  }

  // Allow Enter key to trigger search
  document.getElementById('globalSearchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      openSearchPage();
    }
  });

  // load JSON and start
  async function loadVideoDataAndPlay() {
    try {
      console.log("Fetching JSON:", SHEET_JSON_URL);
      const res = await fetch(SHEET_JSON_URL, { cache: 'no-store' });
      console.log("Fetch status:", res.status, "ok:", res.ok, "content-type:", res.headers.get('content-type'));
      if (!res.ok) {
        const txt = await res.text();
        console.error("非 200 回應，body head:", txt.slice(0,1000));
        throw new Error("Network response was not ok: " + res.status);
      }
      const text = await res.text();
      console.log("response text head:", text.slice(0,1000));
      const data = JSON.parse(text);
      videoData = Array.isArray(data) ? data : [data];
      console.log("Loaded videoData length:", videoData.length);
      if (videoData.length>0) console.log("First item:", videoData[0]);
      await playRandomVideo();
    } catch(err){
      console.error("載入影片資料失敗：", err);
      document.getElementById('video-title').textContent = "無法載入影片資料（詳閱 console）";
      document.getElementById('loading-indicator').style.display = 'none';
    }
  }

  // countdown (kept)
  function updateCountdownBar(){
    const now = new Date();
    const endDate = new Date("2026-04-26T16:30:00+09:00");
    const springM3Date = new Date("2026-04-26T00:00:00+09:00");
    function formatDuration(ms){ const total = Math.floor(Math.abs(ms)/1000); const days=Math.floor(total/86400);const hours=Math.floor((total%86400)/3600);const minutes=Math.floor((total%3600)/60);const seconds=total%60;return `${days}天 ${hours}時 ${minutes}分 ${seconds}秒`; }
    function formatDateForDisplay(d){ try{return d.toLocaleString('zh-Hant-TW',{timeZone:'Asia/Tokyo',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' JST'; }catch(e){ return d.toISOString().replace('T',' ').split('.')[0] + ' JST'; } }
    const remainingMs = endDate - now; const nextMs = springM3Date - now;
    const currentTime = now.toLocaleString('zh-Hant-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const line2 = `<div class="current-time-line">🕒 現在時間：${currentTime}</div>`;
    const line22 = `M3-2026春（第57回即売会）`;
    const line23 = `📅 ${formatDateForDisplay(endDate)}`;
    let line3='',line4='';
    if (nextMs>0){ line3 = `距離下次M3還要 ${formatDuration(nextMs)}`; } else if (remainingMs>0){ line3 = `距離本次M3結束還要 ${formatDuration(remainingMs)}`; } else { line3 = `本次M3已於 ${formatDateForDisplay(endDate)} 結束`; line4 = `（已結束 ${formatDuration(remainingMs)}）`; }
    document.getElementById('countdown-text').innerHTML = `<div>${line2}</div><div>${line22}</div><div>${line23}</div><div>${line3}</div><div>${line4}</div>`;
  }

  // YT API callback (global)
  function onYouTubeIframeAPIReady(){ console.log("YT API loaded"); ensureYouTubePlayer(); }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  // start
  loadVideoDataAndPlay();
  updateCountdownBar();
  setInterval(updateCountdownBar,1000);
  </script>
